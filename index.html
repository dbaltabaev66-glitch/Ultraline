<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Проверка доступа</title>
</head>
<body>
  <h2 id="status">Проверка доступа...</h2>

  <script>
    // Ссылка на Google Form
    const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSfn6TWniRoqsc_MgmLC8CG3LFYOe0Pm_dMYCZG2LwaksJe2OA/viewform?usp=dialog";
    // Ссылка на Google Form
    const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSewLyzQwKvanws5PVjlvErouzfidN7UOOM84P7ZiExmXMInGQ/viewform?usp=dialog";
    // Ссылка на Google Form
    const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSdZ-tRcy1qMIyGm4eQFNdPDXMr5wLPrEkGDMSGRu5EbWLQXbg/viewform?usp=publish-editor"

    // Разрешённые внешние IP-адреса
    const allowedIPs = [
      "46.8.151.243",
      "95.58.11.168",
      "176.110.126.223",
      "85.117.116.61",
      "185.215.160.138",
      "194.35.124.33",
      "185.18.220.121",
      "95.82.64.193",
      "109.239.42.224".

    ];

    const statusEl = document.getElementById("status");

    fetch("https://api.ipify.org?format=json")
      .then((response) => {
        if (!response.ok) {
          throw new Error("Не удалось получить IP");
        }
        return response.json();
      })
      .then((data) => {
        const userIP = data.ip;

        if (allowedIPs.includes(userIP)) {
          statusEl.textContent = "Доступ разрешён. Переход к форме...";
          window.location.replace(formUrl);
        } else {
          statusEl.innerHTML =
            "Доступ разрешён только из офисной сети.<br>Ваш внешний IP: " + userIP;
        }
      })
      .catch((error) => {
        statusEl.textContent = "Ошибка проверки IP: " + error.message;
      });
  </script>
</body>
</html>
