<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Доступ к форме</title>
</head>

<body>

<h2 id="status">Проверка доступа...</h2>

<div id="forms" style="display:none">

<h3>Выберите форму</h3>

<button onclick="openForm(1)">Форма прихода</button>
<button onclick="openForm(2)">Форма ухода</button>
<button onclick="openForm(3)">Форма перерыва</button>

</div>

<script>

const forms = {
1:"https://docs.google.com/forms/d/e/1FAIpQLSfn6TWniRoqsc_MgmLC8CG3LFYOe0Pm_dMYCZG2LwaksJe2OA/viewform",
2:"https://docs.google.com/forms/d/e/1FAIpQLSewLyzQwKvanws5PVjlvErouzfidN7UOOM84P7ZiExmXMInGQ/viewform",
3:"https://docs.google.com/forms/d/e/1FAIpQLSdZ-tRcy1qMIyGm4eQFNdPDXMr5wLPrEkGDMSGRu5EbWLQXbg/viewform"
};

const allowedIPs = [
"46.8.151.243",
"95.58.11.168",
"176.110.126.223",
"85.117.116.61",
"185.215.160.138",
"194.35.124.33",
"185.18.220.121",
"95.82.64.193",
"109.239.42.224"
];

const statusEl = document.getElementById("status");

fetch("https://api.ipify.org?format=json")
.then(response => response.json())
.then(data => {

const userIP = data.ip;

if(allowedIPs.includes(userIP)){

statusEl.innerHTML="Доступ разрешён";
document.getElementById("forms").style.display="block";

}else{

statusEl.innerHTML="Доступ только из офисной сети<br>Ваш IP: "+userIP;

}

});

function openForm(id){

window.location.href=forms[id];

}

</script>

</body>
</html>
