<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Проверка доступа</title>
</head>
<body>
  <h2 id="status">Проверка доступа...</h2>

  <script>
    // Ссылка на Google Form
    const formUrl = "https://docs.google.com/forms/d/e/1FAIpQLSfn6TWniRoqsc_MgmLC8CG3LFYOe0Pm_dMYCZG2LwaksJe2OA/viewform?usp=dialog";

    // Разрешённые внешние IP-адреса
    const allowedIPs = [
      "46.8.151.243"

    ];

    const statusEl = document.getElementById("status");

    fetch("https://api.ipify.org?format=json")
      .then((response) => {
        if (!response.ok) {
          throw new Error("Не удалось получить IP");
        }
        return response.json();
      })
      .then((data) => {
        const userIP = data.ip;

        if (allowedIPs.includes(userIP)) {
          statusEl.textContent = "Доступ разрешён. Переход к форме...";
          window.location.replace(formUrl);
        } else {
          statusEl.innerHTML =
            "Доступ разрешён только из офисной сети.<br>Ваш внешний IP: " + userIP;
        }
      })
      .catch((error) => {
        statusEl.textContent = "Ошибка проверки IP: " + error.message;
      });
  </script>
</body>
</html>
